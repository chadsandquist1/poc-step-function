name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  TF_VERSION:     "1.10.5"
  AWS_REGION:     "us-east-1"
  PYTHON_VERSION: "3.12"
  AWS_ROLE_ARN:   "arn:aws:iam::741448928264:role/email-digest-poc-github-actions"

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  test:
    name: Test
    needs: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Run tests
        run: pytest tests/ -v

  terraform-plan:
    name: Terraform Plan
    needs: test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Write tfvars
        run: echo '${{ secrets.TF_VARS }}' > terraform.tfvars

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false -out=tfplan

      - name: Get Plan Output
        id: plan_output
        run: |
          PLAN_TEXT=$(terraform show -no-color tfplan 2>&1)
          echo "plan_text<<PLAN_EOF" >> "$GITHUB_OUTPUT"
          echo "${PLAN_TEXT:0:65000}" >> "$GITHUB_OUTPUT"
          echo "PLAN_EOF" >> "$GITHUB_OUTPUT"

      - name: Post Plan to PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const c of comments.filter(c =>
              c.user.type === 'Bot' && c.body.includes('Terraform Plan Results'))) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: c.id,
              });
            }
            const icon = o => o === 'success' ? '✅' : '❌';
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Terraform Plan Results
            | Step | Status |
            |------|--------|
            | Format | ${icon('${{ steps.fmt.outcome }}')} \`${{ steps.fmt.outcome }}\` |
            | Validate | ${icon('${{ steps.validate.outcome }}')} \`${{ steps.validate.outcome }}\` |
            | Plan | ${icon('${{ steps.plan.outcome }}')} \`${{ steps.plan.outcome }}\` |

            <details><summary>Show Plan</summary>

            \`\`\`hcl
            ${{ steps.plan_output.outputs.plan_text }}
            \`\`\`
            </details>

            *Run: [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*`,
            });

  terraform-apply:
    name: Terraform Apply
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Write tfvars
        run: echo '${{ secrets.TF_VARS }}' > terraform.tfvars

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Apply
        run: terraform plan -input=false -out=tfplan && terraform apply -auto-approve -input=false tfplan

      - name: Capture Terraform outputs
        id: outputs
        run: |
          echo "state_machine_arn=$(terraform output -raw state_machine_arn)"           >> "$GITHUB_OUTPUT"
          echo "s3_bucket=$(terraform output -raw s3_bucket_name)"                      >> "$GITHUB_OUTPUT"
          echo "dynamodb_table=$(terraform output -raw dynamodb_table_name)"            >> "$GITHUB_OUTPUT"
          echo "ingest_function=$(terraform output -raw email_ingest_function_name)"    >> "$GITHUB_OUTPUT"

      - name: Print deployment summary
        run: |
          echo "### Deployment complete"
          echo "State machine : ${{ steps.outputs.outputs.state_machine_arn }}"
          echo "S3 bucket     : ${{ steps.outputs.outputs.s3_bucket }}"
          echo "DynamoDB table: ${{ steps.outputs.outputs.dynamodb_table }}"
          echo "Ingest Lambda : ${{ steps.outputs.outputs.ingest_function }}"
